name: Android Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04
      options: --privileged # 允许容器具有特权，避免因权限问题造成故障
    defaults:
      run:
        shell: bash
    steps:
      - name: Install base dependencies
        run: |
          apt update

          # 安装依赖
          export DEBIAN_FRONTEND=noninteractive  # 跳过交互式配置
          apt install -y curl zip unzip openjdk-17-jdk python3-pip build-essential dos2unix git

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true
          cmdline-tools-version: 13114758

      - name: Install Android SDK Packages
        shell: bash
        run: |
          echo "📦 Installing Android SDK components..."
          sdkmanager "platform-tools"
          sdkmanager "build-tools;30.0.3"
          sdkmanager "platforms;android-31"
          sdkmanager "ndk;25.1.8937393"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Normalize line endings and fix smart quotes
        run: |
          echo "📦 Converting CRLF to LF..."
          find . -type f -exec dos2unix {} \;
          echo "✂️ Replacing smart quotes (‘’)..."
          find . -type f \( -name "*.py" -o -name "*.sh" -o -name "*.kv" -o -name "*.spec" -o -name "*.yml" \) \
            -exec sed -i "s/‘/'/g; s/’/'/g" {} \;

      - name: Set up environment
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

      - name: Install Buildozer   
        run: |
          pip install --upgrade buildozer cython 

      - name: Check sdkmanager
        run: | 
          echo "Aristo, sdkmanager is: "
          sdkmanager --version
          echo "Aristo, sdkmanager is which: "
          which sdkmanager
          echo "Aristo, this is the issue command: "
          sdkmanager --sdk_root=/github/home/.android/sdk --list || { echo "sdkmanager 命令执行失败"; true; }

          # supports the way of p4a
          ln -s /github/home/.android/sdk/cmdline-tools/13114758 /github/home/.android/sdk/cmdline-tools/latest


      - name: Check Android SDK, NDK
        run: |
          echo "Aristo, ANDROID_HOME: $ANDROID_HOME"
          echo "Aristo, NDK path is:  $ANDROID_HOME/ndk"

      - name: Check java
        run: | 
          # 验证 Java 版本
          echo "Arsito, Java version is:  "
          java -version || true
          javac -version || true

      - name: Setup JAXB for JDK 17
        run: |
          # 创建 JAXB 存储目录
          mkdir -p $HOME/jaxb

          # 下载 JAXB 依赖（兼容 JDK 17）
          curl -L -o $HOME/jaxb/jaxb-api-2.3.3.jar https://repo1.maven.org/maven2/javax/xml/bind/jaxb-api/2.3.3/jaxb-api-2.3.3.jar
          curl -L -o $HOME/jaxb/jaxb-impl-2.3.3.jar https://repo1.maven.org/maven2/com/sun/xml/bind/jaxb-impl/2.3.3/jaxb-impl-2.3.3.jar
          curl -L -o $HOME/jaxb/jaxb-runtime-2.3.3.jar https://repo1.maven.org/maven2/org/glassfish/jaxb/jaxb-runtime/2.3.3/jaxb-runtime-2.3.3.jar

          # 设置 CLASSPATH（包含所有 JAXB 依赖）
          export CLASSPATH="$HOME/jaxb/jaxb-api-2.3.3.jar:$HOME/jaxb/jaxb-impl-2.3.3.jar:$HOME/jaxb/jaxb-runtime-2.3.3.jar"
          echo "CLASSPATH=$CLASSPATH" >> $GITHUB_ENV

          # 设置 JAXB 上下文工厂（强制指定实现类）
          export JAXB_CONTEXT_FACTORY="com.sun.xml.bind.v2.ContextFactory"
          echo "JAXB_CONTEXT_FACTORY=$JAXB_CONTEXT_FACTORY" >> $GITHUB_ENV

      - name: Download Apache Ant
        run: |
          curl -L https://archive.apache.org/dist/ant/binaries/apache-ant-1.9.4-bin.zip -o apache-ant-1.9.4-bin.zip
          unzip apache-ant-1.9.4-bin.zip
          mv apache-ant-1.9.4 /github/home/.ant
          echo "ANT_HOME=/github/home/.ant" >> $GITHUB_ENV
          echo "$ANT_HOME/bin" >> $GITHUB_PATH
          echo "Aristo, this is the ANT check: "
          /github/home/.ant/bin/ant -version || { echo "ant -version 命令执行失败"; true; }
          ls -l /github/home/.ant/bin/ant || { echo "❌ ant 可执行文件不存在或路径错误"; true; }

      - name: Build APK
        run: |
          echo "JAVA_OPTS=--add-modules java.xml.bind" >> $GITHUB_ENV
          yes | buildozer android debug || (find .buildozer -name "*.log" -exec cat {} \; && exit 1)

      - name: List APKs
        run: |
          ls -lh bin/*.apk || echo "No APK found"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: vnd2rmb-apk
          path: bin/*.apk
          if-no-files-found: warn
