name: Android Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04
      options: --privileged # 允许容器具有特权，避免因权限问题造成故障
    defaults:
      run:
        shell: bash
    steps:
      - name: Install base dependencies
        run: |
          apt update

          # 安装依赖
          export DEBIAN_FRONTEND=noninteractive  # 跳过交互式配置
          apt install -y curl zip unzip openjdk-17-jdk python3-pip build-essential dos2unix git
          
      - name: Link sh to dash to fix sdkmanager
        run: |
          ln -sf /bin/dash /usr/bin/sh
          ln -sf /usr/bin/python3 /usr/bin/python

      - name: Upgrade sdkManager
        run: |
          # 下载 Command-line Tools（兼容 JDK 17）
          curl -L -o commandlinetools-linux-latest.zip https://dl.google.com/android/repository/commandlinetools-linux-13114758_latest.zip

          # 清理旧 SDK 目录（备份重要数据后执行）
          rm -rf $ANDROID_HOME
          rm -rf /usr/local/lib/android/sdk

          # 设置 ANDROID_HOME（统一路径）
          ANDROID_HOME=$HOME/Android/Sdk
          export ANDROID_HOME="$ANDROID_HOME"
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          mkdir -p $ANDROID_HOME

          # 解压到临时目录并移动内容
          unzip commandlinetools-linux-latest.zip -d $HOME/temp_sdk
          mkdir -p $ANDROID_HOME/cmdline-tools/latest
          mv $HOME/temp_sdk/cmdline-tools/* $ANDROID_HOME/cmdline-tools/latest/
          rm -rf $HOME/temp_sdk

          # 更新 PATH 并验证
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$PATH"
          export PATH="$ANDROID_HOME/platform-tools:$PATH"

          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

          # 更新 SDK 组件（使用 SDK Manager 脚本）
          sdkmanager --update

          # 接受 SDK 协议（使用统一路径）
          yes | sdkmanager --licenses || true
      
      - name: Setup JAXB for JDK 17
        run: |
          # 创建 JAXB 存储目录
          mkdir -p $HOME/jaxb

          # 验证 Java 版本
          sdkmanager --version || true
          java -version || true
          javac -version || true

          # 下载 JAXB 依赖（兼容 JDK 17）
          curl -L -o $HOME/jaxb/jaxb-api-2.3.3.jar https://repo1.maven.org/maven2/javax/xml/bind/jaxb-api/2.3.3/jaxb-api-2.3.3.jar
          curl -L -o $HOME/jaxb/jaxb-impl-2.3.3.jar https://repo1.maven.org/maven2/com/sun/xml/bind/jaxb-impl/2.3.3/jaxb-impl-2.3.3.jar
          curl -L -o $HOME/jaxb/jaxb-runtime-2.3.3.jar https://repo1.maven.org/maven2/org/glassfish/jaxb/jaxb-runtime/2.3.3/jaxb-runtime-2.3.3.jar

          # 设置 CLASSPATH（包含所有 JAXB 依赖）
          export CLASSPATH="$HOME/jaxb/jaxb-api-2.3.3.jar:$HOME/jaxb/jaxb-impl-2.3.3.jar:$HOME/jaxb/jaxb-runtime-2.3.3.jar"
          echo "CLASSPATH=$CLASSPATH" >> $GITHUB_ENV

          # 设置 JAXB 上下文工厂（强制指定实现类）
          export JAXB_CONTEXT_FACTORY="com.sun.xml.bind.v2.ContextFactory"
          echo "JAXB_CONTEXT_FACTORY=$JAXB_CONTEXT_FACTORY" >> $GITHUB_ENV
    

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Normalize line endings and fix smart quotes
        run: |
          echo "📦 Converting CRLF to LF..."
          find . -type f -exec dos2unix {} \;
          echo "✂️ Replacing smart quotes (‘’)..."
          find . -type f \( -name "*.py" -o -name "*.sh" -o -name "*.kv" -o -name "*.spec" -o -name "*.yml" \) \
            -exec sed -i "s/‘/'/g; s/’/'/g" {} \;

      - name: Set up environment
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=/usr/local/lib/android/sdk/ndk/25.1.8937393" >>  $GITHUB_ENV
           echo "ANDROID_HOME=$HOME/Android/Sdk" >> $GITHUB_ENV

          echo "/usr/local/lib/android/sdk/platform-tools" >> $GITHUB_PATH
          echo "/usr/local/lib/android/sdk/build-tools/30.0.3" >> $GITHUB_PATH
          echo "/usr/local/lib/android/sdk/tools/bin" >> $GITHUB_PATH
          

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true
          cmdline-tools-version: 12266719

      - name: Install Android SDK Packages
        shell: bash
        run: |
          echo "📦 Installing Android SDK components..."
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools"
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;30.0.3"
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-31"
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;25.1.8937393"

      - name: Install Buildozer   
        run: |
          pip install --upgrade buildozer cython 

      - name: Create Buildozer SDK Symlink
        run: |
          SDK_PATH="$HOME/.buildozer/android/platform/android-sdk-21"
          mkdir -p "$(dirname "$SDK_PATH")"
          ln -sf /usr/local/lib/android/sdk "$SDK_PATH"
          echo "SDK_PATH=$SDK_PATH" >> $GITHUB_ENV

      - name: Debug - Structured Environment & SDK Validation
        run: |
          echo "=== 1. 环境变量检查 ==="
          echo "1.1 ANDROID_HOME: ${ANDROID_HOME:-未设置}"
          echo "1.2 JAVA_HOME: ${JAVA_HOME:-未设置}"
          echo "1.3 SDK_PATH: ${SDK_PATH:-未设置}"
          echo "1.4 PATH: $PATH"
          echo ""

          echo "=== 2. 路径有效性验证 ==="
          # 定义检查路径数组
          declare -A PATHS=(
            ["ANDROID_HOME"]=$ANDROID_HOME
            ["JAVA_HOME"]=$JAVA_HOME
            ["SDK_PATH"]=$SDK_PATH
          )

          # 初始化 i 变量
          i=1

          # 检查每个路径是否存在
          for NAME in "${!PATHS[@]}"; do
            PATH_VAL=${PATHS[$NAME]}
            if [ -z "$PATH_VAL" ]; then
              echo "2.${i}. ❌ $NAME 未设置"
              continue
            fi
            if [ -d "$PATH_VAL" ]; then
              echo "2.${i}. ✅ $NAME 路径存在: $PATH_VAL"
            else
              echo "2.${i}. ❌ $NAME 路径不存在: $PATH_VAL"
            fi
            ((i++))
          done
          echo ""

          echo "=== 3. 工具版本检查 ==="
          TOOLS=("java" "sdkmanager" "adb" "buildozer")
          
          # 初始化 i 变量
          i=1
          
          for TOOL in "${TOOLS[@]}"; do
            if command -v $TOOL &> /dev/null; then
              case $TOOL in
                java)
                  echo "3.$i ✅ Java 版本: $(java -version 2>&1 | grep 'version')"
                  ;;
                sdkmanager)
                  echo "3.$i ✅ SDK Manager 版本: $(sdkmanager --version 2>/dev/null | grep -i 'version' || echo '未知版本')"
                  ;;
                buildozer)
                  echo "3.$i ✅ Buildozer 版本: $(buildozer --version 2>&1)"
                  ;;
                *)
                  echo "3.$i ✅ $TOOL 版本: $($TOOL --version 2>&1 | head -n1)"
                  ;;
              esac
            else
              echo "3.$i ❌ $TOOL 未安装或不在 PATH 中"
              [[ " $TOOL " == *" java "*|" sdkmanager "* ]] && exit 1
            fi
            ((i++))
          done
          echo ""

          echo "=== 4. Android SDK 子目录检查 ==="
          SDK_BASE_PATH=${ANDROID_HOME:-/usr/local/lib/android/sdk}
          SUB_DIRS=("cmdline-tools" "build-tools" "platforms" "ndk")
          
          # 初始化 i 变量
          i=1

          for dir in "${SUB_DIRS[@]}"; do
            FULL_PATH="$SDK_BASE_PATH/$dir"
            if [ -d "$FULL_PATH" ]; then
              echo "4.$i ✅ 存在: $FULL_PATH"
            else
              echo "4.$i ❌ 不存在: $FULL_PATH"
            fi
            ((i++))
          done
          echo ""

          echo "=== 5. 高级检查 ==="
          # 检查已安装的 Android 平台
          if [ -d "$ANDROID_HOME/platforms" ]; then
            echo "5.1 已安装的 Android SDK 平台: $(ls -1 "$ANDROID_HOME/platforms" | tr '\n' ' ')"
          else
            echo "5.1 ⚠️ 未找到 Android SDK 平台目录（可能未安装）"
          fi

          # 检查 JDK 工具链
          JDK_TOOLS=("keytool" "jarsigner")
          
          # 初始化 i 变量
          i=2
          
          for TOOL in "${JDK_TOOLS[@]}"; do
            if command -v $TOOL &> /dev/null; then
              echo "5.$i ✅ $TOOL 版本: $($TOOL -version 2>&1 | head -n1)"
            else
              echo "5.$i ⚠️ $TOOL 未在 PATH 中（可能影响签名操作）"
            fi
            ((i++))
          done


      - name: Build APK
        run: |
          echo "JAVA_OPTS=--add-modules java.xml.bind" >> $GITHUB_ENV
          yes | buildozer android debug || (find .buildozer -name "*.log" -exec cat {} \; && exit 1)

      - name: List APKs
        run: |
          ls -lh bin/*.apk || echo "No APK found"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: vnd2rmb-apk
          path: bin/*.apk
          if-no-files-found: warn
