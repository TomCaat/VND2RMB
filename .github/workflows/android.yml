name: Android Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04
      options: --privileged # 允许容器具有特权，避免因权限问题造成故障
    defaults:
      run:
        shell: bash
    steps:
      - name: Install base dependencies
        run: |
          apt update

          # 安装依赖
          export DEBIAN_FRONTEND=noninteractive  # 跳过交互式配置
          apt install -y curl zip unzip openjdk-17-jdk python3-pip build-essential dos2unix git

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true
          cmdline-tools-version: 12266719

      - name: Install Android SDK Packages
        shell: bash
        run: |
          echo "📦 Installing Android SDK components..."
          sdkmanager "platform-tools"
          sdkmanager "build-tools;30.0.3"
          sdkmanager "platforms;android-31"
          sdkmanager "ndk;25.1.8937393"
      
      - name: Check Android SDK Path
        run: |
          echo "Aristo ANDROID_HOME: $ANDROID_HOME"

      - name: Check NDK Path
        run: |
          echo "Aristo $ANDROID_HOME/ndk"

      - name: Override sdkmanager with latest version
        run: |
          # 删除旧版本（可选，但建议确保无冲突）
          rm -rf $ANDROID_HOME/cmdline-tools

          # 下载最新版 command-line tools
          mkdir -p $ANDROID_HOME/cmdline-tools
          curl -sSLo commandlinetools.zip https://dl.google.com/android/repository/commandlinetools-linux-13114758_latest.zip

          # 正确解压到 cmdline-tools/latest（避免多余嵌套）
          mkdir -p $ANDROID_HOME/cmdline-tools/latest
          unzip -q commandlinetools.zip -d $ANDROID_HOME/cmdline-tools/tmp
          mv $ANDROID_HOME/cmdline-tools/tmp/cmdline-tools/* $ANDROID_HOME/cmdline-tools/latest/
          rm -rf $ANDROID_HOME/cmdline-tools/tmp

          # 添加新版 sdkmanager 到 PATH（全局有效）
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Normalize line endings and fix smart quotes
        run: |
          echo "📦 Converting CRLF to LF..."
          find . -type f -exec dos2unix {} \;
          echo "✂️ Replacing smart quotes (‘’)..."
          find . -type f \( -name "*.py" -o -name "*.sh" -o -name "*.kv" -o -name "*.spec" -o -name "*.yml" \) \
            -exec sed -i "s/‘/'/g; s/’/'/g" {} \;

      - name: Set up environment
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          # echo "ANDROID_NDK_HOME=/usr/local/lib/android/sdk/ndk/25.1.8937393" >>  $GITHUB_ENV
  
          # echo "/usr/local/lib/android/sdk/platform-tools" >> $GITHUB_PATH
          # echo "/usr/local/lib/android/sdk/build-tools/30.0.3" >> $GITHUB_PATH
          # echo "/usr/local/lib/android/sdk/tools/bin" >> $GITHUB_PATH

      - name: Install Buildozer   
        run: |
          pip install --upgrade buildozer cython 

      - name: Build APK
        run: |
          echo "JAVA_OPTS=--add-modules java.xml.bind" >> $GITHUB_ENV
          yes | buildozer android debug || (find .buildozer -name "*.log" -exec cat {} \; && exit 1)

      - name: List APKs
        run: |
          ls -lh bin/*.apk || echo "No APK found"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: vnd2rmb-apk
          path: bin/*.apk
          if-no-files-found: warn
