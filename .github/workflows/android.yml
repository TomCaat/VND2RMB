name: Android Build

on:
  push:
    branches: [ main ]
  workflow_run:
    workflows: ["Android Build"]  # 主构建完成后自动触发 post-check
    types:
      - completed  # 成功或失败后均触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y zip unzip openjdk-17-jdk python3-pip build-essential
          pip install --upgrade buildozer cython

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platform-tools
            build-tools;30.0.3
            platforms;android-31
            ndk;25.1.8937393
          accept-android-sdk-licenses: true

      - name: Debug - Print SDK paths
        run: |
          echo "ANDROID_HOME: $ANDROID_HOME"
          echo "Listing SDK root directory:"
          ls -la /usr/local/lib/android/sdk/
          echo "Listing cmdline-tools:"
          ls -la /usr/local/lib/android/sdk/cmdline-tools/
          echo "Listing build-tools:"
          ls -la /usr/local/lib/android/sdk/build-tools/
          echo "Listing platforms:"
          ls -la /usr/local/lib/android/sdk/platforms/
          echo "Listing NDK:"
          ls -la /usr/local/lib/android/sdk/ndk/

      - name: Create Buildozer SDK Symlink
        run: |
          BUILDOZER_SDK_PATH="$HOME/.buildozer/android/platform/android-sdk-21"
          mkdir -p "$(dirname "$BUILDOZER_SDK_PATH")"
          ln -sf /usr/local/lib/android/sdk "$BUILDOZER_SDK_PATH"
          if [ -d "$BUILDOZER_SDK_PATH" ]; then
            echo "✅ Symlink created successfully at $BUILDOZER_SDK_PATH"
          else
            echo "❌ Failed to create symlink"
            exit 1
          fi

      - name: Set up environment variables
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=/usr/local/lib/android/sdk/ndk/25.1.8937393" >> $GITHUB_ENV
          echo "/usr/local/lib/android/sdk/tools/bin" >> $GITHUB_PATH
          echo "/usr/local/lib/android/sdk/platform-tools" >> $GITHUB_PATH
          echo "/usr/local/lib/android/sdk/build-tools/30.0.3" >> $GITHUB_PATH

      - name: Install missing packages with sdkmanager
        run: |
          cd /usr/local/lib/android/sdk/cmdline-tools
          mkdir -p latest && cp -r 16.0/* latest/
          yes | sdkmanager --licenses
          sdkmanager "build-tools;30.0.3" "platforms;android-31" "ndk;25.1.8937393"

      - name: Build APK
        run: |
          buildozer android debug || (find .buildozer -name "*.log" -exec cat {} \; && exit 1)

      - name: List APKs
        run: |
          ls -lh bin/*.apk || echo "No APK found"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: vnd2rmb-apk
          path: bin/*.apk
          if-no-files-found: warn

  # ✅ 新增的 post-check job
  post-check:
    runs-on: ubuntu-latest
    needs: build  # 等待 build job 完成后再执行
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check 1 - Buildozer SDK Symlink
        id: check-symlink
        run: |
          BUILDOZER_PATH="$HOME/.buildozer/android/platform/android-sdk-21"
          if [ -L "$BUILDOZER_PATH" ] && [ -d "$(readlink "$BUILDOZER_PATH")" ]; then
            echo "✅ Buildozer SDK symlink exists and points to a valid directory."
            echo "RESULT=OK" >> $GITHUB_ENV
          else
            echo "❌ Buildozer SDK symlink is missing or invalid!"
            echo "RESULT=FAILED" >> $GITHUB_ENV
          fi
        continue-on-error: true

      - name: Output Check 1 Result
        run: |
          echo "Check 1 Status: ${{ env.RESULT }}"

      - name: Check 2 - SDK Tools Exist
        id: check-sdk-tools
        run: |
          SDK_PATH="/usr/local/lib/android/sdk"
          TOOLS=("build-tools/30.0.3/aapt" "platform-tools/adb")
          for tool in "${TOOLS[@]}"; do
            if [ ! -f "$SDK_PATH/$tool" ]; then
              echo "❌ Missing SDK tool: $tool"
              echo "RESULT=FAILED" >> $GITHUB_ENV
              exit 1
            fi
          done
          echo "✅ All required SDK tools exist."
          echo "RESULT=OK" >> $GITHUB_ENV
        continue-on-error: true

      - name: Output Check 2 Result
        run: |
          echo "Check 2 Status: ${{ env.RESULT }}"

      - name: Check 3 - Buildozer Debug Run
        id: check-buildozer
        run: |
          if buildozer -v android debug 2>&1 | grep -q "ERROR"; then
            echo "❌ Buildozer debug output contains errors!"
            echo "RESULT=FAILED" >> $GITHUB_ENV
          else
            echo "✅ Buildozer debug ran without critical errors."
            echo "RESULT=OK" >> $GITHUB_ENV
          fi
        continue-on-error: true

      - name: Output Check 3 Result
        run: |
          echo "Check 3 Status: ${{ env.RESULT }}"