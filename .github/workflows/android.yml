name: Android Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04
    defaults:
      run:
        shell: bash
    steps:
      - name: Install base dependencies
        run: |
          apt update
          # 检查 yes 命令是否存在，如果不存在则安装
          if ! command -v yes &> /dev/null; then
            echo "yes command not found, installing..."
            sudo apt update
            sudo apt install -y yes
          else
            echo "yes command already installed."
          fi

          # 安装其他依赖
          sudo apt install -y curl zip unzip openjdk-17-jdk python3-pip build-essential dos2unix
        

      - name: Link sh to dash to fix sdkmanager
        run: |
          ln -sf /bin/dash /usr/bin/sh
          ln -sf /usr/bin/python3 /usr/bin/python

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Normalize line endings and fix smart quotes
        run: |
          echo "📦 Converting CRLF to LF..."
          find . -type f -exec dos2unix {} \;
          echo "✂️ Replacing smart quotes (‘’)..."
          find . -type f \( -name "*.py" -o -name "*.sh" -o -name "*.kv" -o -name "*.spec" -o -name "*.yml" \) \
            -exec sed -i "s/‘/'/g; s/’/'/g" {} \;

      - name: Set up environment
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "/usr/local/lib/android/sdk/platform-tools" >> $GITHUB_PATH
          echo "/usr/local/lib/android/sdk/build-tools/30.0.3" >> $GITHUB_PATH
          echo "/usr/local/lib/android/sdk/tools/bin" >> $GITHUB_PATH

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true
          cmdline-tools-version: 12266719

      - name: Create sdkmanager symlink (ensure latest available)
        run: |
          cd /usr/local/lib/android/sdk/cmdline-tools
          mkdir -p latest
          cp -r 16.0/* latest/

      - name: Install Android SDK Packages
        shell: bash
        run: |
          echo "👉 Accepting all licenses..."
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses

          echo "🔄 Updating sdkmanager..."
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --update

          echo "📦 Installing Android SDK components..."
          /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager "platform-tools"
          /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager "build-tools;30.0.3"
          /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-31"
          /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager "ndk;25.1.8937393"

        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          PATH: /usr/local/lib/android/sdk/cmdline-tools/latest/bin:$PATH

      - name: Debug - Print SDK paths
        run: |
          echo "ANDROID_HOME: $ANDROID_HOME"
          ls -la /usr/local/lib/android/sdk/
          ls -la /usr/local/lib/android/sdk/cmdline-tools/
          ls -la /usr/local/lib/android/sdk/build-tools/
          ls -la /usr/local/lib/android/sdk/platforms/
          ls -la /usr/local/lib/android/sdk/ndk/

      - name: Install Buildozer
        run: |
          pip install --upgrade buildozer cython

      - name: Create Buildozer SDK Symlink
        run: |
          SDK_PATH="$HOME/.buildozer/android/platform/android-sdk-21"
          mkdir -p "$(dirname "$SDK_PATH")"
          ln -sf /usr/local/lib/android/sdk "$SDK_PATH"

      - name: Build APK
        run: |
          buildozer android debug || (find .buildozer -name "*.log" -exec cat {} \; && exit 1)

      - name: List APKs
        run: |
          ls -lh bin/*.apk || echo "No APK found"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: vnd2rmb-apk
          path: bin/*.apk
          if-no-files-found: warn
