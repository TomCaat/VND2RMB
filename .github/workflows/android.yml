name: Android Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y zip unzip openjdk-17-jdk python3-pip build-essential
          pip install buildozer cython

      - name: Clear Buildozer cache
        run: rm -rf ~/.buildozer

      - name: Accept SDK licenses
        run: |
          yes | $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install required SDK packages
        run: |
          yes | sdkmanager --update
          yes | sdkmanager "platform-tools" "build-tools;30.0.3" "platforms;android-31"

      - name: Build APK
        run: |
          buildozer android debug

      - name: List APKs
        run: |
          ls -lh bin/*.apk || echo "No APK found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vnd2rmb-apk
          path: bin/*.apk
