name: Android Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y zip unzip openjdk-17-jdk python3-pip build-essential
          pip install --upgrade buildozer cython

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platform-tools
            build-tools;30.0.3
            platforms;android-31
            ndk;25.1.8937393
          accept-android-sdk-licenses: true

      - name: Set up environment variables
        run: |
          echo "ANDROID_HOME=$HOME/.android/sdk" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$HOME/.android/sdk/ndk/25.1.8937393" >> $GITHUB_ENV
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
          echo "$ANDROID_HOME/build-tools/30.0.3" >> $GITHUB_PATH

      - name: Create sdkmanager symlink for Buildozer
        run: |
          # 确保目标目录存在
          mkdir -p "$ANDROID_HOME/tools/bin"

          # 查看实际安装路径（调试用）
          echo "Checking cmdline-tools installation path..."
          ls -la "$ANDROID_HOME/cmdline-tools"

          # 根据实际版本调整路径（示例：12.0.1）
          ln -sf "$ANDROID_HOME/cmdline-tools/12.0.1/bin/sdkmanager" "$ANDROID_HOME/tools/bin/sdkmanager"

          # 验证软链接是否有效
          if [ -f "$ANDROID_HOME/tools/bin/sdkmanager" ]; then
            echo "Symbolic link created successfully."
          else
            echo "Error: Symbolic link not created."
            exit 1
          fi

      - name: Install build-tools and accept licenses
        run: |
          sdkmanager "build-tools;30.0.3"
          yes | sdkmanager --licenses
          yes | sdkmanager --licenses --include_obsolete

      - name: Build APK
        run: |
          buildozer android debug || (find .buildozer -name "*.log" -exec cat {} \; && exit 1)

      - name: List APKs
        run: |
          ls -lh bin/*.apk || echo "No APK found"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: vnd2rmb-apk
          path: bin/*.apk
          if-no-files-found: warn